name = "ask-ari"
main = "src/index.ts"
compatibility_date = "2026-06-25"
compatibility_flags = ["nodejs_compat"]

# Comma-separated list of origins allowed to call this Worker.
# Set the real value with: npx wrangler secret put ALLOWED_ORIGINS
# (kept as a secret rather than [vars] purely so it's not duplicated in
# version control across environments; it isn't sensitive).
# For local dev, put it in .dev.vars instead (see .dev.vars.example).

# Which Claude model answers as Ari. Swap without a code change; redeploy
# (npx wrangler deploy) to apply. Haiku (claude-haiku-4-5) is the budget
# option; Sonnet holds Ari's voice and the writing-style rules noticeably
# better.
[vars]
MODEL = "claude-sonnet-5"

# Rate-limit + circuit-breaker counters live in this KV namespace.
# Create it once with:
#   npx wrangler kv namespace create RATE_LIMIT --binding RATE_LIMIT --update-config
# That command appends the real "id" below automatically.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "b84bdd9854e54ff5987c3d8e4582d20d"

# Chat transcript log (sessions + messages), viewable at /admin.
# Schema lives in schema.sql; apply with:
#   npx wrangler d1 execute ask-ari-logs --file schema.sql          (local dev)
#   npx wrangler d1 execute ask-ari-logs --file schema.sql --remote (production)
[[d1_databases]]
binding = "DB"
database_name = "ask-ari-logs"
database_id = "48e15f55-eeac-47c6-b5d8-03749caa971d"
